<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Price Range — Bunjang Global</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f6;
  --surface:#fff;
  --surface2:#f8f8fa;
  --border:#e6e6ec;
  --border2:#ededf2;
  --text-primary:#0e0e14;
  --text-secondary:#5c5c72;
  --text-tertiary:#a0a0b8;
  --accent:#ff4400;
  --accent-light:#fff3ef;
  --chip-bg:#ececf2;
  --radius-card:14px;
  --radius-chip:100px;
  --shadow-card:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.06);
  --shadow-hover:0 4px 8px rgba(0,0,0,.05),0 16px 48px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.header-inner{max-width:1240px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-size:16px;font-weight:800;letter-spacing:-.3px;white-space:nowrap;display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-bj{color:var(--accent)}
.logo-sep{width:1px;height:14px;background:var(--border);flex-shrink:0}
.logo-pr{color:var(--text-primary)}
.search-wrap{position:relative;width:220px;flex-shrink:0}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);pointer-events:none;display:flex}
.search-input{width:100%;height:36px;padding:0 12px 0 34px;border:1.5px solid var(--border);border-radius:var(--radius-chip);font-family:inherit;font-size:13px;font-weight:600;color:var(--text-primary);background:var(--surface2);outline:none;transition:border-color .15s,background .15s,width .2s}
.search-input:focus{border-color:var(--accent);background:var(--surface)}
.search-input::placeholder{color:var(--text-tertiary);font-weight:400}

/* ── Category hero tabs ── */
.cat-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px}
.cat-tabs-inner{max-width:1240px;margin:0 auto;display:flex;gap:0}
.cat-tab{flex:1;max-width:240px;padding:0;border:none;background:none;cursor:pointer;font-family:inherit;position:relative}
.cat-tab-inner{display:flex;align-items:center;gap:10px;padding:12px 16px 11px;border-bottom:2.5px solid transparent;transition:border-color .15s}
.cat-tab.active .cat-tab-inner{border-bottom-color:var(--accent)}
.cat-tab-emoji{font-size:22px;line-height:1;flex-shrink:0}
.cat-tab-text{text-align:left}
.cat-tab-name{font-size:13px;font-weight:800;color:var(--text-primary);display:block;line-height:1.2}
.cat-tab-sub{font-size:11px;font-weight:600;color:var(--text-tertiary);display:block;line-height:1.3}
.cat-tab:not(.active) .cat-tab-name{color:var(--text-tertiary)}

/* ── Filters ── */
.filters{background:var(--surface);border-bottom:1px solid var(--border)}
.filter-row{max-width:1240px;margin:0 auto;padding:8px 16px;display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.filter-divider-line{height:1px;background:var(--border2)}
.filter-label{font-size:10px;font-weight:800;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;padding-right:4px;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 11px;border-radius:var(--radius-chip);font-family:inherit;font-size:12px;font-weight:700;color:var(--text-secondary);background:var(--chip-bg);border:1.5px solid transparent;cursor:pointer;white-space:nowrap;transition:all .12s;user-select:none;flex-shrink:0}
.chip:hover{color:var(--text-primary);background:#e4e4ec}
.chip.active{background:var(--text-primary);color:#fff;border-color:var(--text-primary)}
.chip-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:100px;background:rgba(0,0,0,.07);color:inherit;opacity:.7}
.chip.active .chip-badge{background:rgba(255,255,255,.18);opacity:1}

/* ── Toolbar ── */
.toolbar{max-width:1240px;margin:0 auto;padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.result-count{font-size:12px;font-weight:600;color:var(--text-secondary)}
.result-count strong{color:var(--text-primary);font-weight:800}
.sort-group{display:flex;gap:4px}
.sort-btn{height:26px;padding:0 10px;border-radius:var(--radius-chip);font-family:inherit;font-size:11px;font-weight:700;color:var(--text-tertiary);background:transparent;border:1.5px solid var(--border);cursor:pointer;transition:all .12s;white-space:nowrap}
.sort-btn:hover{color:var(--text-secondary)}
.sort-btn.active{color:var(--text-primary);border-color:var(--text-primary);background:var(--surface)}

/* ── Grid ── */
.grid{max-width:1240px;margin:0 auto;padding:0 16px 56px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* ── Card ── */
.card{min-width:0;background:var(--surface);border-radius:var(--radius-card);border:1px solid var(--border2);overflow:visible;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;display:flex;flex-direction:column;position:relative}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--border)}
.card-img-wrap{position:relative;width:100%;aspect-ratio:1;background:var(--surface2);overflow:hidden;border-radius:var(--radius-card) var(--radius-card) 0 0;flex-shrink:0}
.card-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .card-img{transform:scale(1.04)}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--border)}
.card-type-badge{position:absolute;top:10px;right:10px;display:inline-flex;align-items:center;height:20px;padding:0 7px;border-radius:5px;font-size:10px;font-weight:800}

.card-body{padding:14px;flex:1;display:flex;flex-direction:column}
.card-click-area{cursor:pointer}
.card-artist{font-size:10px;font-weight:800;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.card-member{font-size:15px;font-weight:800;color:var(--text-primary);line-height:1.25;margin-bottom:1px}
.card-album{font-size:12px;font-weight:600;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:12px}

.confidence{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-bottom:8px;align-self:flex-start}
.conf-high{background:#e8fdf3;color:#007a47}
.conf-mid{background:#fff8e0;color:#7a5500}
.conf-low{background:#f0f0f6;color:var(--text-tertiary)}

.price-row{display:flex;align-items:baseline;gap:5px;margin-bottom:10px}
.price-main{font-size:22px;font-weight:800;letter-spacing:-.8px;color:var(--text-primary)}
.price-label{font-size:11px;font-weight:700;color:var(--text-tertiary)}

/* ── Histogram — key fix: pointer-events on each bar ── */
.histo-wrap{margin-bottom:4px;position:relative}
.histo{display:flex;align-items:flex-end;gap:2px;height:32px}
.hbar{
  flex:1;border-radius:2px 2px 0 0;min-height:3px;
  position:relative;cursor:pointer;
  /* IMPORTANT: pointer-events must be enabled per bar */
  pointer-events:all;
  transition:filter .1s;
}
.hbar:hover{filter:brightness(.8)}
.hbar-base{background:#e4e4ef}
.hbar-near{background:#ffbba8}
.hbar-peak{background:var(--accent)}
.hbar-empty{flex:1;border-radius:2px 2px 0 0;min-height:2px;background:var(--border2);pointer-events:none}
.histo-axis{display:flex;justify-content:space-between;margin-top:4px}
.histo-axis span{font-size:10px;font-weight:700;color:var(--text-tertiary)}

.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:11px;border-top:1px solid var(--border2);margin-top:auto}
.listing-stat{font-size:11px;font-weight:600;color:var(--text-tertiary)}
.listing-stat strong{color:var(--text-secondary);font-weight:800}
.go-btn{display:inline-flex;align-items:center;gap:4px;height:26px;padding:0 10px;background:var(--accent-light);color:var(--accent);border-radius:var(--radius-chip);font-family:inherit;font-size:11px;font-weight:800;border:none;cursor:pointer;text-decoration:none;transition:background .12s;white-space:nowrap;flex-shrink:0}
.go-btn:hover{background:#ffe0d4}

/* ── Tooltip ── fixed position, never clipped ── */
.tooltip{
  position:fixed;z-index:9999;
  background:#111118;color:#fff;
  border-radius:12px;padding:0;
  box-shadow:0 8px 40px rgba(0,0,0,.32);
  pointer-events:auto;
  opacity:0;transition:opacity .1s;
  width:220px;max-height:320px;overflow:hidden;
  display:flex;flex-direction:column;
}
.tooltip.show{opacity:1}
.tooltip.pinned{box-shadow:0 8px 40px rgba(0,0,0,.45),0 0 0 2px var(--accent);}
.tooltip-header{padding:9px 12px;font-size:10.5px;font-weight:700;color:rgba(255,255,255,.5);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.tooltip-list{overflow-y:auto}
.tooltip-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:background .1s}
.tooltip-item:hover{background:rgba(255,255,255,.07)}
.tooltip-item-img{width:36px;height:36px;border-radius:6px;object-fit:cover;background:#2a2a3a;flex-shrink:0}
.tooltip-item-body{min-width:0;flex:1}
.tooltip-item-price{font-size:12.5px;font-weight:800;line-height:1.2}
.tooltip-item-name{font-size:10px;font-weight:600;color:rgba(255,255,255,.5);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Empty ── */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px}
.empty-emoji{font-size:36px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:800;color:var(--text-secondary);margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--text-tertiary)}

/* ── Group listings modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,10,16,.55);z-index:10000;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:960px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.modal-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:800;color:var(--text-primary)}
.modal-sub{font-size:12px;font-weight:600;color:var(--text-secondary);margin-top:2px}
.modal-close{width:30px;height:30px;flex-shrink:0;border-radius:100px;border:none;background:var(--surface2);cursor:pointer;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--chip-bg);color:var(--text-primary)}
.modal-scroll{flex:1;min-height:0;overflow-y:auto}
.modal-grid{padding:16px 20px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;align-content:start}
.modal-item{cursor:pointer;border-radius:12px;overflow:hidden;border:1px solid var(--border2);background:var(--surface);transition:box-shadow .12s,transform .12s}
.modal-item:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.modal-item-img-wrap{width:100%;aspect-ratio:1;background:var(--surface2);overflow:hidden}
.modal-item-img{width:100%;height:100%;object-fit:cover;display:block}
.modal-item-body{padding:8px 10px 10px}
.modal-item-price{font-size:13px;font-weight:800;color:var(--text-primary)}
.modal-item-name{font-size:11px;font-weight:600;color:var(--text-secondary);margin-top:3px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-clamp:2;overflow:hidden}

/* ── Mobile ── */
@media(max-width:600px){
  .search-wrap{width:160px}
  .grid{grid-template-columns:minmax(0,1fr) minmax(0,1fr);padding:0 12px 48px;gap:10px}
  .card-body{padding:10px}
  .card-member{font-size:13px}
  .price-main{font-size:18px}
  .cat-tab-inner{padding:10px 12px 9px}
  .cat-tab-emoji{font-size:18px}
  .card-footer{flex-wrap:wrap;gap:6px}
  .listing-stat{white-space:nowrap}
  .go-btn{font-size:10px;padding:0 8px}
}
@media(max-width:380px){
  .grid{grid-template-columns:minmax(0,1fr)}
  .search-wrap{width:130px}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-bj">bunjang</span>
      <div class="logo-sep"></div>
      <span class="logo-pr">Price Range</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.2" stroke="currentColor" stroke-width="1.6"/>
          <path d="M9.2 9.2l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search artist, character…">
    </div>
  </div>
</header>

<!-- Category tabs -->
<div class="cat-tabs">
  <div class="cat-tabs-inner">
    <button class="cat-tab active" id="tabKidult" onclick="switchCat('kidult')">
      <div class="cat-tab-inner">
        <span class="cat-tab-emoji">🧸</span>
        <div class="cat-tab-text">
          <span class="cat-tab-name">Kidult</span>
          <span class="cat-tab-sub">Figures & Dolls</span>
        </div>
      </div>
    </button>
    <button class="cat-tab" id="tabKpop" onclick="switchCat('kpop')">
      <div class="cat-tab-inner">
        <span class="cat-tab-emoji">🎴</span>
        <div class="cat-tab-text">
          <span class="cat-tab-name">K-pop</span>
          <span class="cat-tab-sub">Photocards</span>
        </div>
      </div>
    </button>
  </div>
</div>

<!-- Artist filter -->
<div class="filters">
  <div class="filter-row" id="artistRow">
    <span class="filter-label">Artist</span>
  </div>
  <div class="filter-divider-line"></div>
  <div class="filter-row" id="typeRow">
    <span class="filter-label">Type</span>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <span class="result-count" id="resultCount">Loading…</span>
</div>

<!-- Grid -->
<div class="grid" id="grid"></div>

<!-- Tooltip (outside grid, fixed position) -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-header" id="ttHeader"></div>
  <div class="tooltip-list" id="ttList"></div>
</div>

<!-- Group listings modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-scroll">
      <div class="modal-grid" id="modalGrid"></div>
    </div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────
const TYPE_COLORS={
  "Album":            {bg:"#e6eeff",text:"#1a44cc"},
  "Concert":          {bg:"#fff0e0",text:"#b85500"},
  "Fan Club":         {bg:"#eafff3",text:"#007a47"},
  "Benefit":          {bg:"#f3eeff",text:"#6600cc"},
  "Collabo":          {bg:"#fffae0",text:"#886600"},
  "Fan Meeting":      {bg:"#e6fff9",text:"#006655"},
  "Fan Sign":         {bg:"#ffe6f8",text:"#880066"},
  "Season's Greeting":{bg:"#e6f2ff",text:"#005599"},
  "Etc":              {bg:"#f0f0f6",text:"#555570"},
};

// English member name map (Korean → English)
const MEMBER_EN={
  "정국":"Jungkook","지민":"Jimin","뷔":"V","진":"Jin","슈가":"Suga","제이홉":"J-Hope","RM":"RM",
  "니키":"Nishimura Riki","정원":"Jungwon","희승":"Heeseung","제이":"Jay","제이크":"Jake","선우":"Sunoo","성훈":"Sunghoon",
  "방찬":"Bang Chan","리노":"Lee Know","창빈":"Changbin","현진":"Hyunjin","한":"Han","필릭스":"Felix","승민":"Seungmin","아이엔":"I.N",
  "에스쿱스":"S.Coups","정한":"Jeonghan","조슈아":"Joshua","준":"Jun","호시":"Hoshi","원우":"Wonwoo","울지":"Woozi","도겸":"DK","민규":"Mingyu","더에잇":"The8","승관":"Seungkwan","버논":"Vernon","디노":"Dino",
  "연준":"Yeonjun","수빈":"Soobin","범규":"Beomgyu","태현":"Taehyun","휴닝카이":"Huening Kai",
  "홍중":"Hongjoong","성화":"Seonghwa","윤호":"Yunho","여상":"Yeosang","산":"San","민기":"Mingi","우영":"Wooyoung","종호":"Jongho",
  "쇼타로":"Shotaro","은석":"Eunseok","성찬":"Seungchan","원빈":"Wonbin","앤톤":"Anton","소희":"Sohee",
  "성한빈":"Sung Hanbin","김규빈":"Kim Gyuvin","장하오":"Zhang Hao","석매튜":"Seok Matthew","김태래":"Kim Taerae","리키":"Ricky","박건욱":"Park Gunwook","한유진":"Han Yujin","앤더블":"Kim Jiwoong",
  "예준":"Yejun","노아":"Noah","밤비":"Bambi","하민":"Hamin","은호":"Eunho",
  "성진":"Sungjin","영케이":"Young K","원필":"Wonpil","도운":"Dowoon",
  "희찬":"Hichan","도훈":"Dohoon","신유":"Shinyu","경민":"Kyungmin","영재":"Youngjae","지훈":"Jihoon",
  "상연":"Sangyeon","제이콥":"Jacob","영훈":"Younghoon","현재":"Hyunjae","주연":"Juyeon","케빈":"Kevin","뉴":"New","큐":"Q","주학":"Juhaknyeon","에릭":"Eric",
  "성호":"Sungho","리우":"Riu","명재현":"Jaehyun","태산":"Taesan","이한":"Leehan","운학":"Woonhak",
  "쿤":"Kun","텐":"Ten","루카스":"Lucas","샤오쥔":"Xiaojun","헨드리":"Hendery","양양":"Yangyang","윈윈":"WinWin",
  // units
  "부석순":"BSS","이오데":"Even of Day","늑댕즈":"Neokdaengz","제복":"Jebog","목갈머":"Mokgalmeo","떨차":"Ttteolcha","3RACHA":"3RACHA",
};

function enName(kr){ return MEMBER_EN[kr] || kr; }
function imgUrl(raw){ return raw?(raw.replace?raw.replace("{res}","360"):raw):""; }
function toUSD(krw){ return `$${Math.round(krw/1400)}`; }
function median(arr){
  const s=[...arr].sort((a,b)=>a-b), m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}

function buildHisto(items, bins=8){
  const prices=items.map(i=>i.price).filter(p=>p>0);
  if(prices.length<2) return null;
  const min=Math.min(...prices), max=Math.max(...prices);
  if(min===max) return null;
  const step=(max-min)/bins;
  const b=Array(bins).fill(null).map(()=>({count:0,items:[]}));
  items.filter(i=>i.price>0).forEach(item=>{
    const idx=Math.min(Math.floor((item.price-min)/step),bins-1);
    b[idx].count++;
    b[idx].items.push(item);
  });
  return {bins:b, min, max, step};
}

// ── State ────────────────────────────────────────────────────────────────
let allGroups=[], activeCat="kidult", activeArtist=null, activeType=null, sortMode="count", searchQ="";

function switchCat(cat){
  activeCat=cat;
  activeArtist=null; activeType=null;
  document.getElementById("tabKpop").classList.toggle("active",cat==="kpop");
  document.getElementById("tabKidult").classList.toggle("active",cat==="kidult");
  buildFilters(allGroups.filter(g=>g.cat===cat));
  renderGrid();
}

function buildGroups(data){
  const map={};
  data.filter(r=>!r.exclude&&r.group_key).forEach(r=>{
    const k=r.group_key;
    // determine category: figure_doll vs photocard
    const cat = r.cat || "kpop";
    if(!map[k]) map[k]={key:k,cat,artist:r.artist_normalized,member:r.member_normalized,album:r.album_or_event_normalized,type:r.source_type_normalized,items:[]};
    map[k].items.push({pid:r.pid,price:Number(r.price)||0,name:r.name,image:imgUrl(r.image)});
  });
  return Object.values(map).filter(g=>g.items.length>=1);
}

function buildFilters(groups){
  const aCounts={};
  groups.forEach(g=>{aCounts[g.artist]=(aCounts[g.artist]||0)+g.items.length;});
  const artists=Object.entries(aCounts).sort((a,b)=>b[1]-a[1]);
  const ar=document.getElementById("artistRow");
  ar.innerHTML='<span class="filter-label">Artist</span>';
  makeChip(ar,"All",null,"artist");
  artists.slice(0,20).forEach(([a,c])=>makeChip(ar,a,c,"artist"));

  const tCounts={};
  groups.forEach(g=>{tCounts[g.type]=(tCounts[g.type]||0)+g.items.length;});
  const types=Object.entries(tCounts).sort((a,b)=>b[1]-a[1]);
  const tr=document.getElementById("typeRow");
  tr.innerHTML='<span class="filter-label">Type</span>';
  makeChip(tr,"All",null,"type");
  types.forEach(([t,c])=>makeChip(tr,t,c,"type"));
}

function makeChip(container,label,count,group){
  const btn=document.createElement("button");
  btn.className="chip";
  btn.dataset.group=group;
  btn.dataset.value=label==="All"?"":label;
  btn.innerHTML=label+(count!=null?` <span class="chip-badge">${count}</span>`:"");
  btn.addEventListener("click",()=>{
    if(group==="artist") activeArtist=label==="All"?null:label;
    else activeType=label==="All"?null:label;
    updateChips(); renderGrid();
  });
  container.appendChild(btn);
}

function updateChips(){
  document.querySelectorAll(".chip[data-group='artist']").forEach(b=>b.classList.toggle("active",b.dataset.value===(activeArtist||"")));
  document.querySelectorAll(".chip[data-group='type']").forEach(b=>b.classList.toggle("active",b.dataset.value===(activeType||"")));
}

function getFiltered(){
  let g=allGroups.filter(x=>x.cat===activeCat);
  if(activeArtist) g=g.filter(x=>x.artist===activeArtist);
  if(activeType) g=g.filter(x=>x.type===activeType);
  if(searchQ){
    const q=searchQ.toLowerCase();
    g=g.filter(x=>(x.artist||"").toLowerCase().includes(q)||(x.member||"").toLowerCase().includes(q)||(x.album||"").toLowerCase().includes(q)||enName(x.member||"").toLowerCase().includes(q));
  }
  return g;
}
function validCount(g){ return g.items.filter(i=>i.price>0).length; }
function getSorted(groups){
  return [...groups].sort((a,b)=>{
    if(sortMode==="count") return validCount(b)-validCount(a);
    const ma=median(a.items.map(i=>i.price)), mb=median(b.items.map(i=>i.price));
    return sortMode==="median_desc"?mb-ma:ma-mb;
  });
}

// ── Tooltip ──────────────────────────────────────────────────────────────
const tt=document.getElementById("tooltip");
let ttActive=false, overTooltip=false, hideTimer=null, ttPinned=false;

function escHtml(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function bunjangUrl(pid){ return `https://globalbunjang.com/product/${pid}`; }

// ── GlobalBunjang English name enrichment ───────────────────────────────
// Names come in Korean from the domestic search API; GlobalBunjang's own
// get-summaries endpoint (proxied via /api/goods-enrich) has the EN titles
// buyers actually see. Render with the raw name first (instant), then swap
// in the English name once the batch lookup resolves.
const enrichCache={};
async function fetchEnglishNames(pids){
  const uncached=[...new Set(pids)].filter(p=>!(p in enrichCache));
  if(!uncached.length) return;
  try{
    const res=await fetch(`/api/goods-enrich?pids=${uncached.join(",")}`);
    if(!res.ok) throw new Error("bad response");
    const map=await res.json();
    uncached.forEach(p=>{ enrichCache[p]=map[p]||null; });
  }catch(e){
    uncached.forEach(p=>{ enrichCache[p]=null; }); // fall back to raw name, don't retry every render
  }
}
function displayName(it){ return enrichCache[it.pid]||it.name; }

let ttGen=0;
function renderTooltipItems(items){
  document.getElementById("ttList").innerHTML=items.map(it=>`
    <div class="tooltip-item" onclick="window.open('${bunjangUrl(it.pid)}','_blank')">
      ${it.image?`<img class="tooltip-item-img" src="${it.image}">`:`<div class="tooltip-item-img"></div>`}
      <div class="tooltip-item-body">
        <div class="tooltip-item-price">${toUSD(it.price)}</div>
        <div class="tooltip-item-name">${escHtml(displayName(it))}</div>
      </div>
    </div>`).join("");
}
function showTT(e, bin, rangeMin, rangeMax){
  const items=[...bin.items].sort((a,b)=>a.price-b.price);
  const myGen=++ttGen;
  document.getElementById("ttHeader").textContent=`${items.length} listing${items.length!==1?"s":""} · ${toUSD(rangeMin)}–${toUSD(rangeMax)}`;
  renderTooltipItems(items);
  moveTT(e);
  tt.classList.add("show");
  ttActive=true;
  fetchEnglishNames(items.map(i=>i.pid)).then(()=>{ if(myGen===ttGen) renderTooltipItems(items); });
}
function moveTT(e){
  const W=220, H=Math.min(tt.scrollHeight||320,320);
  let x=e.clientX+16, y=e.clientY-H/2;
  if(x+W>window.innerWidth-8) x=e.clientX-W-16;
  if(y<8) y=8;
  if(y+H>window.innerHeight-8) y=window.innerHeight-H-8;
  tt.style.left=x+"px"; tt.style.top=y+"px";
}
function hideTT(){ if(ttPinned) return; tt.classList.remove("show"); ttActive=false; }
function unpinAndHide(){ ttPinned=false; tt.classList.remove("show","pinned"); ttActive=false; }
function scheduleHide(){ if(ttPinned) return; hideTimer=setTimeout(hideTT,150); }
function cancelHide(){ if(hideTimer){clearTimeout(hideTimer); hideTimer=null;} }
tt.addEventListener("mouseenter",()=>{overTooltip=true; cancelHide();});
tt.addEventListener("mouseleave",()=>{overTooltip=false; scheduleHide();});
document.addEventListener("mousemove",e=>{ if(ttActive && !overTooltip && !ttPinned) moveTT(e); });
// 바깥 클릭으로 pinned tooltip 닫기
document.addEventListener("click",e=>{
  if(ttPinned && !tt.contains(e.target) && !e.target.closest(".hbar")){
    unpinAndHide();
  }
});
document.addEventListener("keydown",e=>{ if(e.key==="Escape" && ttPinned) unpinAndHide(); });

// ── Card render ───────────────────────────────────────────────────────────
let cardIdx=0;
function renderCard(g, cid){
  const prices=g.items.map(i=>i.price).filter(p=>p>0);
  if(!prices.length) return "";
  const med=median(prices), minP=Math.min(...prices), maxP=Math.max(...prices), n=prices.length;
  const color=TYPE_COLORS[g.type]||TYPE_COLORS["Etc"];
  const lowestItem=g.items.reduce((a,b)=>a.price<b.price?a:b);
  const itemUrl=bunjangUrl(lowestItem.pid);

  const withImg=g.items.filter(i=>i.image);
  const thumbUrl=withImg.length?withImg[Math.floor(Math.random()*withImg.length)].image:"";

  const memberEn=enName(g.member||"");

  const h=buildHisto(g.items);

  let confCls,confText;
  if(n>=10){confCls="conf-high";confText=`● ${n} data points`;}
  else if(n>=4){confCls="conf-mid";confText=`● ${n} listings`;}
  else{confCls="conf-low";confText=`● ${n} listing${n>1?"s":""}`;}

  let histHtml="";
  if(h){
    const maxC=Math.max(...h.bins.map(b=>b.count),1);
    const medBin=Math.min(Math.floor((med-h.min)/h.step),h.bins.length-1);
    h.bins.forEach((bin,i)=>{
      if(bin.count===0){
        histHtml+=`<div class="hbar-empty" style="height:2%"></div>`;
        return;
      }
      // linear rescale into [8,100] so every distinct count gets a distinct height
      // (a flat floor like max(8, count/maxC*100) would collapse small counts to the same 8%)
      const pct=Math.round(8+(bin.count/maxC)*92);
      const cls=i===medBin?"hbar hbar-peak":Math.abs(i-medBin)<=1?"hbar hbar-near":"hbar hbar-base";
      histHtml+=`<div class="${cls}" style="height:${pct}%" data-bin="${i}"></div>`;
    });
  }

  return `
<div class="card" data-cid="${cid}">
  <div class="card-img-wrap" onclick="openGroupModal('${cid}')">
    ${thumbUrl
      ?`<img class="card-img" src="${thumbUrl}" alt="${memberEn}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      :""}
    <div class="card-img-placeholder" style="${thumbUrl?"display:none":""}">🎴</div>
    <span class="card-type-badge" style="background:${color.bg};color:${color.text}">${g.type}</span>
  </div>
  <div class="card-body">
    <div class="card-click-area" onclick="openGroupModal('${cid}')">
      <div class="card-artist">${g.artist||""}</div>
      <div class="card-member">${memberEn}</div>
      <div class="card-album">${g.album||""}</div>
      <span class="confidence ${confCls}">${confText}</span>
      <div class="price-row">
        <span class="price-main">${toUSD(med)}</span>
        <span class="price-label">median</span>
      </div>
    </div>
    ${h?`
    <div class="histo-wrap">
      <div class="histo" data-cid="${cid}">${histHtml}</div>
      <div class="histo-axis"><span>${toUSD(h.min)}</span><span>${toUSD(h.max)}</span></div>
    </div>`:""}
    <div class="card-footer">
      <span class="listing-stat" onclick="event.stopPropagation(); openGroupModal('${cid}')"><strong>${n}</strong> listings</span>
      <button class="go-btn" onclick="event.stopPropagation(); openGroupModal('${cid}')">
        View all · from ${toUSD(minP)}
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5h7M5.5 2l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
</div>`;
}

// Attach histogram hover — called after DOM insert
// Store group data by cid for event delegation
const groupByCid={};

function getHoveredBin(e){
  const bar = e.target.closest(".hbar");
  if(!bar) return null;
  const histo = bar.closest(".histo");
  if(!histo) return null;
  const cid = histo.dataset.cid;
  const binIdx = parseInt(bar.dataset.bin);
  if(isNaN(binIdx)) return null;
  const g = groupByCid[cid];
  if(!g) return null;
  const h = buildHisto(g.items);
  if(!h) return null;
  const bin = h.bins[binIdx];
  if(!bin || !bin.count) return null;
  const binMin = h.min + binIdx * h.step;
  const binMax = Math.min(h.min + (binIdx+1) * h.step, h.max);
  return {bin, binMin, binMax};
}

function attachHistoEvents(){
  document.addEventListener("mouseover", e=>{
    const hit = getHoveredBin(e);
    if(!hit) return;
    cancelHide();
    showTT(e, hit.bin, hit.binMin, hit.binMax);
  });
  document.addEventListener("mouseout", e=>{
    if(!e.target.closest(".hbar")) return;
    if(e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest("#tooltip")) return;
    scheduleHide();
  });
  document.addEventListener("click", e=>{
    const hit = getHoveredBin(e);
    if(!hit) return;
    e.stopPropagation();
    ttPinned=true;
    tt.classList.add("pinned");
    showTT(e, hit.bin, hit.binMin, hit.binMax);
  });
}

function renderGrid(){
  updateChips();
  const filtered=getFiltered();
  const sorted=getSorted(filtered);
  const totalListings=filtered.reduce((s,g)=>s+g.items.length,0);
  document.getElementById("resultCount").innerHTML=`<strong>${sorted.length}</strong> products · ${totalListings} listings`;

  const grid=document.getElementById("grid");
  if(!sorted.length){
    grid.innerHTML=`<div class="empty"><div class="empty-emoji">🔍</div><div class="empty-title">No results</div><div class="empty-sub">Try a different search or filter</div></div>`;
    return;
  }
  cardIdx=0;
  const cards=sorted.map(g=>{
    const cid="c"+(cardIdx++);
    groupByCid[cid]=g;
    return renderCard(g, cid);
  });
  grid.innerHTML=cards.join("");
}
